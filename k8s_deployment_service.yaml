apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: devsecops
  name: devsecops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops
  template:
    metadata:
      labels:
        app: devsecops
    spec:
      volumes:
      - name: tmp-volume
        emptyDir: {}
      serviceAccountName: default
      containers:
      - image: austinmundy90/numeric-app:latest
        name: devsecops-container
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
        securityContext:
          runAsNonRoot: true
          # Remove runAsUser and readOnlyRootFilesystem
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: devsecops
  name: devsecops-svc
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: devsecops
  type: NodePort